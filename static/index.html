<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat GPB</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
      line-height: 1.5;
      background: #f5f5f5;
    }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .meta { color: #666; font-size: 0.85rem; margin-bottom: 1rem; }
    #log {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      min-height: 320px;
      max-height: 50vh;
      overflow-y: auto;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .msg { margin-bottom: 1rem; }
    .msg.user { color: #1a5276; }
    .msg.assistant { color: #333; }
    .msg strong { display: block; margin-bottom: 0.25rem; }
    form { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: flex-end; }
    textarea, button {
      font-family: inherit;
      font-size: 1rem;
    }
    textarea {
      flex: 1 1 100%;
      min-height: 72px;
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      padding: 0.5rem 1rem;
      background: #ff7a00;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .status { font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>
  <p style="margin-bottom:0.5rem"><a href="/admin" style="color:#ff7a00">Gerenciar base de conhecimento</a></p>
  <h1>Chat GPB</h1>
  <p class="meta">Assistente local (Ollama + Qwen) com PPCs IFSC</p>
  <p id="status" class="status">Verificando...</p>
  <div id="log"></div>
  <form id="form">
    <textarea id="input" placeholder="Sua pergunta..." required></textarea>
    <button type="submit" id="send">Enviar</button>
  </form>
  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const status = document.getElementById('status');
    const history = [];

    function append(role, content) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = '<strong>' + (role === 'user' ? 'Voce' : 'Assistente') + '</strong>' +
        content.replace(/\n/g, '<br>');
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    async function checkHealth() {
      try {
        const r = await fetch('/health');
        const d = await r.json();
        if (d.ok && d.model_available) {
          status.textContent = 'Ollama OK — modelo ' + d.model;
        } else if (d.ok) {
          status.textContent = 'Ollama OK, mas modelo ' + d.model + ' pode nao estar instalado (ollama pull)';
        } else {
          status.textContent = 'Ollama offline — inicie o Ollama';
        }
      } catch (e) {
        status.textContent = 'API offline — rode uvicorn na pasta chat-gpb';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      send.disabled = true;
      history.push({ role: 'user', content: text });
      append('user', text);

      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: history,
            stream: false
          })
        });
        const d = await r.json();
        if (!r.ok) {
          append('assistant', 'Erro: ' + (d.detail || r.statusText));
        } else {
          const reply = d.message?.content || '(sem resposta)';
          history.push({ role: 'assistant', content: reply });
          append('assistant', reply);
        }
      } catch (err) {
        append('assistant', 'Falha na requisicao: ' + err.message);
      }
      send.disabled = false;
    });

    checkHealth();
  </script>
</body>
</html>
